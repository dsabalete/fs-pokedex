name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint
      - name: Run npm test
        run: npm test
      - name: Run npm build
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #   with:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # - name: Run fllyctl deploy --remote-only --wait-timeout 15
      #   run: flyctl deploy --remote-only --wait-timeout 15
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Trigger deployment
        if: ${{ github.event_name == 'push' }}
        run: curl -s -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      - name: Wait for deployment
        if: ${{ github.event_name == 'push' }}
        run: |
          for i in {1..30}; do
            response=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/srv-d704uo7kijhs73d6jepg/deploys?limit=1")
            status=$(echo "$response" | jq -r '.[0].deploy.status // "unknown"')
            echo "Attempt $i/30: status=$status"
            if [[ "$status" == "live" ]]; then
              echo "Deployment is live!"
              exit 0
            fi
            if [[ "$status" == "failed" || "$status" == "canceled" ]]; then
              echo "Deployment failed or canceled."
              echo "Response: $response"
              exit 1
            fi
            # If stuck in build or update, show more details
            if [[ "$status" == "build_in_progress" || "$status" == "update_in_progress" ]]; then
              echo "Deployment details:"
              echo "$response" | jq '.[0]'
            fi
            sleep 10
          done
          echo "Timeout after 30 attempts"
          exit 1

  tag_release:
    needs: [simple_deployment_pipeline]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bump version and push tag
        if: ${{ github.event_name == 'push' }}
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          DRY_RUN: false
