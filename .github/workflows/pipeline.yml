name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint
      - name: Run npm test
        run: npm test
      - name: Run npm build
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #   with:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # - name: Run fllyctl deploy --remote-only --wait-timeout 15
      #   run: flyctl deploy --remote-only --wait-timeout 15
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Trigger deployment
        run: curl -s -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      - name: Wait for deployment
        run: |
          for i in {1..10}; do
            status=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/srv-d704uo7kijhs73d6jepg/deploys?limit=1" \
              | jq -r '.[0].deploy.status // "unknown"')
            echo "Attempt $i/10: status=$status"
            [[ "$status" == "live" ]] && exit 0
            [[ "$status" == "failed" || "$status" == "canceled" ]] && exit 1
            sleep 10
          done
          echo "Timeout"
          exit 1
