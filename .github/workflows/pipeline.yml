name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.skip.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dependencies, check style, run tests, and build
        run: |
          npm install
          npm run eslint
          npm test
          npm run build
      - name: Install Playwright Browsers and run tests
        run: |
          npx playwright install --with-deps
          npx playwright test
      - name: Check for #skip in commit messages
        id: skip
        run: |
          git fetch --prune --unshallow || true
          SKIP=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi

          if git rev-parse --verify "${RANGE%%..*}" >/dev/null 2>&1 && git rev-parse --verify "${RANGE##*..}" >/dev/null 2>&1; then
            echo "Checking commit range: $RANGE"
            if git log --pretty=%B "$RANGE" | grep -iq "#skip"; then
              SKIP=true
            fi
          else
            echo "Revision range invalid or unavailable ($RANGE), checking latest commit only."
            if git log --pretty=%B -n 1 | grep -iq "#skip"; then
              SKIP=true
            fi
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #   with:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # - name: Run fllyctl deploy --remote-only --wait-timeout 15
      #   run: flyctl deploy --remote-only --wait-timeout 15
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Trigger deployment
        if: ${{ github.event_name == 'push' && steps.skip.outputs.skip == 'false' }}
        run: curl -s -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      - name: Wait for deployment
        if: ${{ github.event_name == 'push' && steps.skip.outputs.skip == 'false' }}
        run: |
          for i in {1..30}; do
            response=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/srv-d704uo7kijhs73d6jepg/deploys?limit=1")
            status=$(echo "$response" | jq -r '.[0].deploy.status // "unknown"')
            echo "Attempt $i/30: status=$status"
            if [[ "$status" == "live" ]]; then
              echo "Deployment is live!"
              exit 0
            fi
            if [[ "$status" == "failed" || "$status" == "canceled" ]]; then
              echo "Deployment failed or canceled."
              echo "Response: $response"
              exit 1
            fi
            # If stuck in build or update, show more details
            if [[ "$status" == "build_in_progress" || "$status" == "update_in_progress" ]]; then
              echo "Deployment details:"
              echo "$response" | jq '.[0]'
            fi
            sleep 10
          done
          echo "Timeout after 30 attempts"
          exit 1

  tag_release:
    needs: [ci]
    if: ${{ github.event_name == 'push' && needs.ci.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bump version and push tag
        if: ${{ github.event_name == 'push' }}
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          DRY_RUN: true

  notification:
    needs: [ci]
    if: ${{ github.event_name == 'push' && needs.ci.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send deployment notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
