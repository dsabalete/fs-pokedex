name: Hello World!

on:
  push:
    branches:
      - main

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: |
          echo "Hello World!"
  run_date_job:
    runs-on: ubuntu-latest
    steps:
      - name: Run date
        run: date
  run_ls_job:
    runs-on: ubuntu-latest
    steps:
      - name: Run ls -l
        run: ls -l
